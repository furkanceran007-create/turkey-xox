<!doctype html><html lang="tr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Turkey XoX Live</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#f1f5f9;color:#0f172a;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{max-width:1050px;margin:auto;padding:16px 10px}.top{background:#0f172a;color:white;border-radius:22px;padding:18px;margin-bottom:14px}.cardx{background:white;border:1px solid #e2e8f0;border-radius:20px;box-shadow:0 8px 20px rgba(15,23,42,.06)}.grid{width:100%;border-collapse:separate;border-spacing:7px;table-layout:fixed}.grid th{height:52px;font-size:12px;text-align:center;color:#475569}.grid td{height:94px;border:2px dashed #cbd5e1;border-radius:16px;text-align:center;vertical-align:middle;cursor:pointer;position:relative;background:#f8fafc}.grid td.selected{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.15)}.grid td.filled{border-style:solid;background:#fff;cursor:default}.count{position:absolute;right:7px;top:7px;background:#e2e8f0;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:800}.mark{font-size:30px;font-weight:900;display:block}.x{color:#2563eb}.o{color:#f59e0b}.pname{font-size:11px;font-weight:800;line-height:1.1;display:block}.msg{border:1px solid #e2e8f0;background:#fff;border-radius:14px;padding:12px;font-weight:650}.msg.ok{background:#ecfdf5;color:#065f46}.msg.bad{background:#fef2f2;color:#991b1b}.mode-btn.active,.diff-btn.active{background:#0f172a!important;color:white!important}.suggestions{display:none;position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 10px 22px rgba(15,23,42,.12);z-index:50;max-height:230px;overflow:auto}.suggestion{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-weight:700;cursor:pointer}@media(max-width:650px){.grid{border-spacing:4px}.grid th{font-size:10px;height:44px}.grid td{height:75px}.mark{font-size:24px}.pname{font-size:9px}}
</style></head><body><div class="app">
<div class="top d-flex justify-content-between align-items-center gap-2 flex-wrap"><div><h1 class="h3 fw-bold mb-1">Turkey XoX Live</h1><div class="text-white-50 small">Canlı karşılıklı futbol grid</div></div><div class="badge text-bg-light text-dark rounded-pill px-3 py-2" id="dataBadge">Veri yükleniyor...</div></div>
<div class="row g-3"><div class="col-lg-8">
<div class="cardx p-3 mb-3"><div class="row g-2 align-items-end"><div class="col-md-6"><label class="form-label fw-bold">Supabase URL</label><input class="form-control" id="supabaseUrl"></div><div class="col-md-6"><label class="form-label fw-bold">Anon Key</label><input class="form-control" id="supabaseKey"></div><div class="col-12"><button class="btn btn-dark fw-bold" onclick="saveSupabaseConfig()">Bağlantıyı Kaydet</button></div></div></div>
<div class="cardx p-3 mb-3"><div class="d-flex flex-wrap gap-2 justify-content-between mb-3"><div class="btn-group"><button class="btn btn-outline-dark mode-btn active" data-mode="local" onclick="setMode('local')">Yerel</button><button class="btn btn-outline-dark mode-btn" data-mode="balanced" onclick="setMode('balanced')">Dengeli</button><button class="btn btn-outline-dark mode-btn" data-mode="europe" onclick="setMode('europe')">Avrupa</button></div><div class="btn-group"><button class="btn btn-outline-dark diff-btn active" data-difficulty="easy" onclick="setDifficulty('easy')">Kolay</button><button class="btn btn-outline-dark diff-btn" data-difficulty="medium" onclick="setDifficulty('medium')">Orta</button><button class="btn btn-outline-dark diff-btn" data-difficulty="hard" onclick="setDifficulty('hard')">Zor</button></div></div>
<div class="row g-2 mb-3"><div class="col-6 col-md-3"><div class="p-2 border rounded-3"><small>Sıra</small><div class="fw-bold" id="turnText">-</div></div></div><div class="col-6 col-md-3"><div class="p-2 border rounded-3"><small>Sen</small><div class="fw-bold" id="sideText">-</div></div></div><div class="col-6 col-md-3"><div class="p-2 border rounded-3"><small>Oda</small><div class="fw-bold" id="roomText">-</div></div></div><div class="col-6 col-md-3"><div class="p-2 border rounded-3"><small>Skor</small><div class="fw-bold" id="scoreText">0 - 0</div></div></div></div><table class="grid" id="grid"></table></div>
<div class="cardx p-3"><div class="row g-2 align-items-end"><div class="col position-relative"><label class="form-label fw-bold">Futbolcu adı</label><input class="form-control form-control-lg" id="playerInput" placeholder="Oyuncu yaz..." oninput="suggest()" autocomplete="off"><div id="suggestions" class="suggestions"></div></div><div class="col-auto"><button class="btn btn-primary btn-lg fw-bold" onclick="submitGuess()">Oyna</button></div></div><div class="msg mt-3" id="msg">Oda oluştur veya koda katıl.</div></div></div>
<div class="col-lg-4"><div class="cardx p-3 mb-3"><h2 class="h5 fw-bold">Canlı Oyun</h2><button class="btn btn-primary w-100 fw-bold mb-2" onclick="createRoom()">Oda Oluştur</button><div class="input-group"><input class="form-control" id="joinCode" placeholder="Oda kodu"><button class="btn btn-dark fw-bold" onclick="joinRoom()">Katıl</button></div></div><div class="cardx p-3 mb-3"><button class="btn btn-outline-dark w-100 mb-2" onclick="shuffleBoard()">Eşleşmeleri Karıştır</button><button class="btn btn-outline-danger w-100" onclick="leaveRoom()">Odadan Çık</button></div><div class="cardx p-3"><h2 class="h6 fw-bold">Cevap Paneli</h2><button class="btn btn-sm btn-outline-secondary mb-2" onclick="toggleAnswers()">Aç/Kapat</button><div id="answersBox" style="display:none;max-height:280px;overflow:auto;font-size:13px"></div></div></div></div></div>
<script>
let SUPABASE_URL=localStorage.getItem("tx_supabase_url")||"",SUPABASE_KEY=localStorage.getItem("tx_supabase_key")||"";supabaseUrl.value=SUPABASE_URL;supabaseKey.value=SUPABASE_KEY;let sb=null,players=[],allTeams=[],teamFreq=new Map(),playerByNorm=new Map(),pairMap=new Map(),mode="balanced",difficulty="easy",room=null,channel=null,myId=localStorage.getItem("tx_player_id")||crypto.randomUUID(),mySide=null,selected=null;localStorage.setItem("tx_player_id",myId);const DATA_FILE="turkiye_agirlikli_grid_datalake_v9.json";
const localTeamsBase=new Set(["Galatasaray","Fenerbahçe","Beşiktaş","Trabzonspor","Başakşehir","Sivasspor","Kayserispor","Konyaspor","Gençlerbirliği","Ankaragücü","Bursaspor","Rizespor","Antalyaspor","Alanyaspor","Adana Demirspor","Gaziantepspor","Gaziantep FK","Göztepe","Altay","Samsunspor","Kocaelispor","Sakaryaspor","Eskişehirspor","Denizlispor","Manisaspor","Akhisarspor","Karabükspor","İstanbulspor","Mersin İdman Yurdu","Orduspor","Yeni Malatyaspor","Hatayspor","Boluspor","Bandırmaspor","Ümraniyespor","Eyüpspor","Erzurumspor","Elazığspor","Adanaspor","Kasımpaşa","Osmanlıspor","İstanbul BB"]);
const euroTeamsBase=new Set(["Real Madrid","Barcelona","Atletico Madrid","Sevilla","Valencia","Villarreal","Manchester United","Manchester City","Chelsea","Arsenal","Liverpool","Tottenham","Newcastle United","Inter","AC Milan","Juventus","Roma","Napoli","Lazio","Fiorentina","PSG","Lyon","Marseille","Monaco","Lille","Bayern Münih","Bayern Munich","Dortmund","Ajax","PSV","Feyenoord","Porto","Benfica","Sporting","Braga","Olympiacos","Panathinaikos","Celtic","Rangers"]);
const knownExtraTeamsBase=new Set(["Boca Juniors","River Plate","Santos","Flamengo","Palmeiras","Corinthians","LA Galaxy","Inter Miami","Al Nassr","Al Hilal","Shakhtar Donetsk","Zenit","Bayer Leverkusen","Leicester City","Everton","West Ham","Aston Villa","Real Betis","Atalanta","Nice","Rennes"]);
function norm(s){return(s||"").toLocaleLowerCase("tr-TR").replaceAll("ı","i").replaceAll("İ","i").replaceAll("ş","s").replaceAll("ğ","g").replaceAll("ü","u").replaceAll("ö","o").replaceAll("ç","c").replace(/[^a-z0-9 ]+/g," ").replace(/\s+/g," ").trim()}function pairKey(a,b){return[a,b].sort((x,y)=>x.localeCompare(y,"tr")).join("|||")}function msg(t,type=""){let e=document.getElementById("msg");e.textContent=t;e.className="msg mt-3 "+type}function initSupabase(){if(SUPABASE_URL&&SUPABASE_KEY)sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)}function saveSupabaseConfig(){SUPABASE_URL=supabaseUrl.value.trim();SUPABASE_KEY=supabaseKey.value.trim();localStorage.setItem("tx_supabase_url",SUPABASE_URL);localStorage.setItem("tx_supabase_key",SUPABASE_KEY);initSupabase();msg("Bağlantı kaydedildi.","ok")}
async function loadData(){try{let r=await fetch(DATA_FILE),a=await r.json();players=sanitize(a);buildIndex();dataBadge.textContent=players.length.toLocaleString("tr-TR")+" oyuncu";msg("Veri hazır.","ok");render()}catch(e){msg("JSON aynı klasörde olmalı: "+DATA_FILE,"bad")}}function sanitize(a){let m=new Map();for(let it of a){if(!it||!it.name||!Array.isArray(it.teams))continue;let name=String(it.name).trim(),k=norm(name);if(!k||["nan","none","null","undefined"].includes(k))continue;if(!m.has(k))m.set(k,{name,teams:[]});let o=m.get(k);for(let raw of it.teams){let t=String(raw||"").trim(),b=norm(t);if(!t||["nan","none","null","undefined","retired","without club","unknown","career break","free transfer"].includes(b))continue;if(!o.teams.includes(t))o.teams.push(t)}}return[...m.values()].filter(p=>p.teams.length)}
function buildIndex(){allTeams=[...new Set(players.flatMap(p=>p.teams))];teamFreq=new Map();playerByNorm=new Map();pairMap=new Map();for(let p of players){playerByNorm.set(norm(p.name),p);for(let t of p.teams)teamFreq.set(t,(teamFreq.get(t)||0)+1);let ts=[...new Set(p.teams)];for(let i=0;i<ts.length;i++)for(let j=i+1;j<ts.length;j++){let k=pairKey(ts[i],ts[j]);if(!pairMap.has(k))pairMap.set(k,[]);pairMap.get(k).push(p)}}}
function answers(a,b){return pairMap.get(pairKey(a,b))||[]}function teamCount(t){return teamFreq.get(t)||0}function sample(a,n,u=new Set()){let o=[],g=0;while(o.length<n&&g<n*120){let x=a[Math.floor(Math.random()*a.length)];if(x&&!u.has(x)&&!o.includes(x))o.push(x);g++}return o}function target(){return difficulty==="easy"?{min:7,max:220}:difficulty==="medium"?{min:3,max:80}:{min:1,max:28}}function validPair(a,b){let n=answers(a,b).length,r=target();return n>=r.min&&n<=r.max}function validGrid(r,c){if(new Set([...r,...c]).size!==6)return false;for(let x of r)for(let y of c)if(!validPair(x,y))return false;return true}
function allowedTeams(){let l=[],e=[],k=[];for(let t of allTeams){let c=teamCount(t);if(localTeamsBase.has(t))l.push(t);else if(euroTeamsBase.has(t))e.push(t);else if(knownExtraTeamsBase.has(t)&&c>=6)k.push(t)}if(mode==="local")return[...new Set([...l,...e.filter(t=>teamCount(t)>=10),...k])];if(mode==="balanced")return[...new Set([...l,...e,...k])];return[...new Set([...e,...k,...l.filter(t=>teamCount(t)>=12)])]}function makeBoard(){let cand=allowedTeams();for(let z=0;z<5000;z++){let p=[],u=new Set();if(mode==="local"){let l=sample(cand.filter(t=>localTeamsBase.has(t)),4,u);l.forEach(x=>u.add(x));p=[...l,...sample(cand,2,u)]}else if(mode==="balanced"){let l=sample(cand.filter(t=>localTeamsBase.has(t)),3,u);l.forEach(x=>u.add(x));let e=sample(cand.filter(t=>euroTeamsBase.has(t)),2,u);e.forEach(x=>u.add(x));p=[...l,...e,...sample(cand,1,u)]}else{let e=sample(cand.filter(t=>euroTeamsBase.has(t)),4,u);e.forEach(x=>u.add(x));p=[...e,...sample(cand,2,u)]}if(p.length<6)continue;p=p.sort(()=>Math.random()-.5);let rows=p.slice(0,3),cols=p.slice(3,6);if(validGrid(rows,cols))return{rows,cols}}return{rows:["Galatasaray","Fenerbahçe","Beşiktaş"],cols:["Trabzonspor","Inter","Real Madrid"]}}
function roomCode(){return Math.floor(100000+Math.random()*900000).toString()}async function createRoom(){if(!sb)return msg("Önce Supabase bağlantısını kaydet.","bad");let code=roomCode(),b=makeBoard(),obj={room_code:code,host_id:myId,status:"waiting",mode,difficulty,rows:b.rows,cols:b.cols,board:[[null,null,null],[null,null,null],[null,null,null]],turn:"X",score_x:0,score_o:0};let{data,error}=await sb.from("rooms").insert(obj).select().single();if(error)return msg(error.message,"bad");room=data;mySide="X";subscribeRoom(code);msg("Oda kodu: "+code,"ok");render()}
async function joinRoom(){if(!sb)return msg("Önce Supabase bağlantısını kaydet.","bad");let code=joinCode.value.trim(),q=await sb.from("rooms").select("*").eq("room_code",code).single();if(q.error)return msg("Oda bulunamadı.","bad");let u=await sb.from("rooms").update({guest_id:myId,status:"playing"}).eq("room_code",code).select().single();if(u.error)return msg(u.error.message,"bad");room=u.data;mySide="O";subscribeRoom(code);msg("Odaya katıldın.","ok");render()}
function subscribeRoom(code){if(channel)sb.removeChannel(channel);channel=sb.channel("room-"+code).on("postgres_changes",{event:"UPDATE",schema:"public",table:"rooms",filter:"room_code=eq."+code},p=>{room=p.new;render()}).subscribe()}async function updateRoom(f){let r=await sb.from("rooms").update(f).eq("room_code",room.room_code).select().single();if(r.error)return msg(r.error.message,"bad");room=r.data;render()}async function shuffleBoard(){if(!room||mySide!=="X")return msg("Sadece oda sahibi karıştırabilir.","bad");let b=makeBoard();await updateRoom({rows:b.rows,cols:b.cols,board:[[null,null,null],[null,null,null],[null,null,null]],turn:"X",winner:null,mode,difficulty})}
function winner(b){let L=[[[0,0],[0,1],[0,2]],[[1,0],[1,1],[1,2]],[[2,0],[2,1],[2,2]],[[0,0],[1,0],[2,0]],[[0,1],[1,1],[2,1]],[[0,2],[1,2],[2,2]],[[0,0],[1,1],[2,2]],[[0,2],[1,1],[2,0]]];for(let l of L){let m=l.map(([r,c])=>b[r][c]?.mark);if(m[0]&&m.every(x=>x===m[0]))return m[0]}return null}
async function submitGuess(){if(!room)return msg("Oda yok.","bad");if(room.turn!==mySide)return msg("Sıra sende değil.","bad");if(!selected)return msg("Kare seç.","bad");let name=playerInput.value.trim();if(!name)return msg("Oyuncu yaz.","bad");let p=playerByNorm.get(norm(name)),ans=answers(room.rows[selected.r],room.cols[selected.c]),ok=p&&ans.some(x=>norm(x.name)===norm(p.name));let b=room.board,next=mySide==="X"?"O":"X",f={turn:next};if(ok){b[selected.r][selected.c]={mark:mySide,player:p.name};let w=winner(b);f.board=b;if(w){f.winner=w;f.status="finished";if(w==="X")f.score_x=(room.score_x||0)+1;else f.score_o=(room.score_o||0)+1}msg("Doğru.","ok")}else msg("Yanlış. Sıra geçti.","bad");await sb.from("moves").insert({room_code:room.room_code,player_side:mySide,row_index:selected.r,col_index:selected.c,player_name:name,is_correct:!!ok});selected=null;playerInput.value="";await updateRoom(f)}
function selectCell(r,c){if(!room||room.board[r][c])return;selected={r,c};render()}function setMode(m){mode=m;document.querySelectorAll(".mode-btn").forEach(b=>b.classList.toggle("active",b.dataset.mode===m))}function setDifficulty(d){difficulty=d;document.querySelectorAll(".diff-btn").forEach(b=>b.classList.toggle("active",b.dataset.difficulty===d))}
function suggest(){let q=norm(playerInput.value),box=suggestions;if(q.length<2){box.style.display="none";return}let list=[];for(let p of players){let n=norm(p.name);if(n.includes(q)){list.push(p);if(list.length>=10)break}}box.innerHTML=list.map(p=>`<div class="suggestion" onclick="pick('${p.name.replaceAll("'","\\'")}')">${p.name}</div>`).join("");box.style.display=list.length?"block":"none"}function pick(n){playerInput.value=n;suggestions.style.display="none"}
function render(){let r=room?.rows||["-","-","-"],c=room?.cols||["-","-","-"],b=room?.board||[[null,null,null],[null,null,null],[null,null,null]];roomText.textContent=room?.room_code||"-";sideText.textContent=mySide||"-";turnText.textContent=room?.winner?("Kazanan "+room.winner):(room?.turn||"-");scoreText.textContent=(room?.score_x||0)+" - "+(room?.score_o||0);let h="<tr><th></th>"+c.map(x=>`<th>${x}</th>`).join("")+"</tr>";for(let i=0;i<3;i++){h+=`<tr><th>${r[i]}</th>`;for(let j=0;j<3;j++){let cell=b[i][j],cnt=answers(r[i],c[j]).length;if(cell)h+=`<td class="filled"><span class="mark ${cell.mark.toLowerCase()}">${cell.mark}</span><span class="pname">${cell.player}</span></td>`;else h+=`<td onclick="selectCell(${i},${j})" class="${selected&&selected.r===i&&selected.c===j?'selected':''}"><span class="count">${cnt}</span>+</td>`}h+="</tr>"}grid.innerHTML=h;updateAnswers()}function updateAnswers(){if(!room)return;let out="";for(let r=0;r<3;r++)for(let c=0;c<3;c++)out+=`<div class="border-bottom py-2"><b>${room.rows[r]} + ${room.cols[c]}</b><br>${answers(room.rows[r],room.cols[c]).slice(0,12).map(p=>p.name).join(", ")}</div>`;answersBox.innerHTML=out}function toggleAnswers(){answersBox.style.display=answersBox.style.display==="none"?"block":"none"}function leaveRoom(){room=null;mySide=null;if(channel)sb.removeChannel(channel);render();msg("Odadan çıktın.")}
initSupabase();loadData();
</script></body></html>
