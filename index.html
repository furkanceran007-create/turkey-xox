<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Turkey XoX">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Turkey XoX v4</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-base: #f1f5f9;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-light: #e2e8f0;
      --border-dark: #cbd5e1;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / .05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / .1), 0 2px 4px -2px rgb(0 0 0 / .1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / .1), 0 4px 6px -4px rgb(0 0 0 / .1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; min-height: 100%; overflow-x: hidden; }
    body {
      min-height: 100vh;
      color: var(--text-main);
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background-color: var(--bg-base);
      -webkit-font-smoothing: antialiased;
    }
    button { font-size: 16px !important; touch-action: manipulation; }
    input, select, textarea { font-size: 16px !important; -webkit-text-size-adjust: 100%; }

    .app { max-width: 1200px; margin: 0 auto; padding: 24px 16px 40px; }

    .topbar {
      background-color: #0f172a;
      color: #ffffff;
      border-radius: var(--radius-xl);
      padding: 24px 32px;
      box-shadow: var(--shadow-lg);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .brand-logo {
      width: 56px; height: 56px;
      border-radius: var(--radius-lg);
      display: grid; place-items: center;
      background: #1e293b;
      border: 1px solid #334155;
      font-size: 28px;
      flex: 0 0 auto;
    }
    .brand-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
    .brand-subtitle { color: #94a3b8; font-size: 15px; margin-top: 4px; font-weight: 500; }

    .chip {
      display: inline-flex; align-items: center; gap: 8px;
      background: #1e293b; border: 1px solid #334155;
      color: #e2e8f0; border-radius: 999px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      white-space: nowrap;
    }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 4px rgba(16,185,129,.2); }

    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 355px; gap: 24px; }
    .glass-card, .side-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
    }

    .game-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }

    .mode-control {
      display: flex; gap: 4px; padding: 4px;
      background: #f1f5f9; border-radius: 999px;
      border: 1px solid var(--border-light);
    }
    .mode-btn {
      border: 0; background: transparent; color: var(--text-muted);
      font-weight: 600; font-size: 14px !important; padding: 8px 16px;
      border-radius: 999px; transition: all .2s ease;
    }
    .mode-btn:hover { color: var(--text-main); }
    .mode-btn.active { background: #ffffff; color: var(--text-main); box-shadow: var(--shadow-sm); }

    .stat-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm);
      min-width: 0;
    }
    .stat .label {
      display: flex; align-items: center; gap: 6px; font-size: 12px; text-transform: uppercase;
      letter-spacing: .5px; color: var(--text-muted); font-weight: 700; margin-bottom: 8px;
    }
    .stat .value { font-size: 18px; font-weight: 800; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .board-section { padding: 0 24px 24px; }
    .board-frame { background: var(--bg-base); border-radius: var(--radius-xl); padding: 12px; border: 1px solid var(--border-light); overflow: hidden; }
    table.grid { width: 100%; border-collapse: separate; border-spacing: 12px; table-layout: fixed; }

    .grid th, .grid td { border-radius: var(--radius-lg); text-align: center; vertical-align: middle; }
    .grid th {
      height: 64px; padding: 8px; background: transparent;
      color: var(--text-muted); font-size: 14px; font-weight: 700; line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .grid td {
      height: 120px; background: var(--surface); border: 1px solid var(--border-light);
      position: relative; padding: 12px; box-shadow: var(--shadow-sm); transition: all .2s ease;
    }
    .grid td.empty { cursor: pointer; border: 2px dashed var(--border-dark); background: #f8fafc; box-shadow: none; }
    .grid td.empty:hover { border-color: var(--primary); background: #eff6ff; transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .grid td.selected { border-color: var(--primary); background: #eff6ff; border-style: solid; border-width: 2px; box-shadow: 0 0 0 4px rgba(37,99,235,.15); }

    .plus {
      width: 40px; height: 40px; border-radius: 50%; display: inline-grid; place-items: center;
      background: #e2e8f0; color: #64748b; font-size: 24px; font-weight: 400; transition: all .2s ease;
    }
    .grid td.empty:hover .plus { background: var(--primary); color: #fff; }

    .mark { display: block; font-size: 32px; font-weight: 900; line-height: 1; margin-bottom: 8px; }
    .mark.x { color: var(--primary); }
    .mark.o { color: var(--warning); }
    .player-name {
      display: block; font-size: 13px; line-height: 1.2; font-weight: 700;
      color: var(--text-main); word-break: break-word;
    }
    .cell-tag {
      position: absolute; right: 12px; top: 12px; background: #e2e8f0; color: #475569;
      padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700;
    }

    .play-panel { margin: 0 24px 24px; background: var(--bg-base); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 20px; }
    .player-input {
      border-radius: var(--radius-md); border: 1px solid var(--border-dark);
      padding: 14px 16px; font-size: 16px !important; font-weight: 600; box-shadow: var(--shadow-sm);
    }
    .player-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,.15); outline: none; }
    .play-btn { border-radius: var(--radius-md); padding: 14px 24px; font-weight: 700; min-height: 54px; }

    .suggestions {
      display: none; position: absolute; z-index: 80; left: 0; right: 0; top: calc(100% + 4px);
      background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg); overflow: hidden; max-height: 300px;
    }
    .suggestion { padding: 12px 16px; border-bottom: 1px solid var(--border-light); cursor: pointer; font-weight: 600; color: var(--text-main); transition: background .1s; }
    .suggestion:last-child { border-bottom: none; }
    .suggestion:hover, .suggestion.active { background: #f1f5f9; }

    .message {
      margin-top: 16px; border-radius: var(--radius-md); padding: 14px 16px;
      border: 1px solid var(--border-light); background: #ffffff; color: var(--text-main);
      font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;
    }
    .message:before { content: "\F4A4"; font-family: "bootstrap-icons"; font-size: 18px; }
    .message.ok { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }
    .message.ok:before { content: "\F26A"; color: #10b981; }
    .message.bad { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .message.bad:before { content: "\F335"; color: #ef4444; }

    .sidebar { display: flex; flex-direction: column; gap: 24px; }
    .side-card-header { padding: 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .side-card-header h2 { font-size: 16px; font-weight: 800; margin: 0; color: var(--text-main); }
    .side-card-body { padding: 20px; }
    .room-code-box {
      background:#f8fafc; border:1px solid var(--border-light); border-radius: var(--radius-md);
      padding: 12px 14px; font-weight: 800; font-size: 20px; letter-spacing: 1px; text-align:center;
    }

    .toast-pro {
      position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%);
      background: #1e293b; color: #fff; border-radius: 999px; padding: 14px 24px;
      font-size: 14px; font-weight: 600; box-shadow: var(--shadow-lg); display: none; z-index: 9999;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    }

    @media (max-width: 680px) {
      .app { padding: 12px 8px 24px; }
      .topbar { padding: 18px 14px; border-radius: var(--radius-lg); margin-bottom: 14px; }
      .brand-logo { width: 44px; height: 44px; font-size: 22px; border-radius: 14px; }
      .brand-title { font-size: 22px; }
      .brand-subtitle { font-size: 13px; }
      .chip { padding: 7px 11px; font-size: 12px; }
      .layout { gap: 14px; }
      .game-header { padding: 14px; gap: 10px; }
      .mode-control { width: 100%; }
      .mode-btn { flex: 1; text-align: center; padding: 8px 10px; font-size: 13px !important; }
      .stat-strip { grid-template-columns: 1fr 1fr; padding: 14px; gap: 10px; }
      .stat { padding: 12px; border-radius: 14px; }
      .stat .label { font-size: 10px; margin-bottom: 6px; }
      .stat .value { font-size: 15px; }
      .board-section { padding: 0 10px 10px; }
      .board-frame { padding: 5px; border-radius: 16px; }
      table.grid { border-spacing: 4px; }
      .grid th { font-size: 10px; height: 42px; padding: 3px; border-radius: 10px; }
      .grid td { height: 74px; padding: 4px; border-radius: 12px; }
      .plus { width: 30px; height: 30px; font-size: 18px; }
      .cell-tag { right: 4px; top: 4px; font-size: 9px; padding: 1px 5px; }
      .mark { font-size: 22px; margin-bottom: 4px; }
      .player-name { font-size: 9px; line-height: 1.05; }
      .play-panel { margin: 0 10px 10px; padding: 14px; border-radius: 14px; }
      .play-btn { width: 100%; min-height: 52px; }
      .sidebar { display: flex; gap: 14px; }
      .side-card-header { padding: 14px; }
      .side-card-body { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="topbar">
      <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
        <div class="d-flex align-items-center gap-3">
          <div class="brand-logo">⚽</div>
          <div>
            <h1 class="brand-title">Turkey XoX</h1>
            <div class="brand-subtitle">Canlı karşılıklı futbol grid</div>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <div class="chip"><span class="pulse"></span><span id="dataBadge">Veri hazırlanıyor...</span></div>
        </div>
      </div>
    </section>

    <div class="layout">
      <main class="glass-card">
        <div class="game-header">
          <div class="mode-control">
            <button class="mode-btn active" data-mode="local" onclick="setMode('local')">Yerel</button>
            <button class="mode-btn" data-mode="balanced" onclick="setMode('balanced')">Dengeli</button>
            <button class="mode-btn" data-mode="europe" onclick="setMode('europe')">Avrupa</button>
          </div>
          <div class="mode-control difficulty-control">
            <button class="mode-btn active" data-difficulty="easy" onclick="setDifficulty('easy')">Kolay</button>
            <button class="mode-btn" data-difficulty="medium" onclick="setDifficulty('medium')">Orta</button>
            <button class="mode-btn" data-difficulty="hard" onclick="setDifficulty('hard')">Zor</button>
          </div>
        </div>

        <div class="stat-strip">
          <div class="stat"><div class="label"><i class="bi bi-controller"></i> Sıra</div><div class="value" id="turnText">-</div></div>
          <div class="stat"><div class="label"><i class="bi bi-person"></i> Sen</div><div class="value" id="sideText">-</div></div>
          <div class="stat"><div class="label"><i class="bi bi-door-open"></i> Oda</div><div class="value" id="roomText">-</div></div>
          <div class="stat"><div class="label"><i class="bi bi-trophy"></i> Skor</div><div class="value" id="scoreText">0 - 0</div></div>
        </div>

        <div class="board-section"><div class="board-frame"><table class="grid" id="grid"></table></div></div>

        <div class="play-panel">
          <div class="row g-3 align-items-end mb-3">
            <div class="col-12 col-md">
              <label class="form-label text-muted fw-bold mb-2">FUTBOLCU ADI</label>
              <div class="input-wrap position-relative">
                <input class="form-control player-input w-100" id="playerInput" placeholder="Oyuncu adını yazmaya başla..." autocomplete="off" oninput="suggest()" onkeydown="handleKey(event)" onblur="setTimeout(hideSuggest,180)">
                <div id="suggestions" class="suggestions w-100"></div>
              </div>
            </div>
            <div class="col-12 col-md-auto">
              <button class="btn btn-primary play-btn w-100" onclick="submitGuess()"><i class="bi bi-check2-circle me-2"></i>Hamle Yap</button>
            </div>
          </div>
          <div id="msg" class="message">Oda oluştur veya koda katıl.</div>

          <div class="d-flex flex-wrap gap-2 mt-4 pt-3 border-top">
            <button class="btn btn-dark fw-bold rounded-pill px-4" onclick="shuffleBoard()"><i class="bi bi-shuffle me-1"></i> Karıştır</button>
            <button class="btn btn-outline-secondary fw-bold rounded-pill px-4" onclick="newRound()"><i class="bi bi-arrow-repeat me-1"></i> Yeni Tablo</button>
            <button class="btn btn-outline-danger fw-bold rounded-pill px-3 ms-auto" onclick="leaveRoom()"><i class="bi bi-box-arrow-right me-1"></i> Çık</button>
          </div>
        </div>
      </main>

      <aside class="sidebar">
        <section class="side-card">
          <div class="side-card-header">
            <h2><i class="bi bi-wifi me-2"></i>Canlı Oyun</h2>
          </div>
          <div class="side-card-body">
            <button class="btn btn-primary w-100 fw-bold mb-3" onclick="createRoom()">Oda Oluştur</button>
            <div class="input-group mb-3">
              <input class="form-control" id="joinCode" placeholder="Oda kodu" inputmode="numeric" pattern="[0-9]*" maxlength="6">
              <button class="btn btn-dark fw-bold" onclick="joinRoom()">Katıl</button>
            </div>
            <div class="room-code-box" id="roomCodeBox">------</div>
          </div>
        </section>

        <section class="side-card">
          <div class="side-card-header">
            <h2><i class="bi bi-info-circle me-2"></i>Durum</h2>
          </div>
          <div class="side-card-body">
            <div class="small text-muted fw-semibold" id="statusText">Veri hazırlanıyor...</div>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <div id="toast" class="toast-pro"></div>

<script>
const SUPABASE_URL="https://rqaiqaglttvmtiqtvlcj.supabase.co";
const SUPABASE_KEY="sb_publishable_KYfl4P83lfv9ltr-1QmIXw_wQfsP-GM";
const DATA_FILE="turkiye_grid_data_optimized.json";

let sb=null, players=[], allTeams=[], teamFreq=new Map(), playerByNorm=new Map(), pairMap=new Map(), playerSearch=[];
let mode="local", difficulty="easy", room=null, channel=null, selected=null;
let myId=localStorage.getItem("tx_player_id")||crypto.randomUUID(), mySide=null;
let lastBoardSignature="";
localStorage.setItem("tx_player_id",myId);

const localTeamsBase=new Set(["Galatasaray","Fenerbahçe","Beşiktaş","Trabzonspor","Başakşehir","Sivasspor","Kayserispor","Konyaspor","Gençlerbirliği","Ankaragücü","Bursaspor","Rizespor","Antalyaspor","Alanyaspor","Adana Demirspor","Gaziantepspor","Gaziantep FK","Göztepe","Altay","Samsunspor","Kocaelispor","Sakaryaspor","Eskişehirspor","Denizlispor","Manisaspor","Akhisarspor","Karabükspor","İstanbulspor","Mersin İdman Yurdu","Orduspor","Yeni Malatyaspor","Hatayspor","Boluspor","Bandırmaspor","Ümraniyespor","Eyüpspor","Erzurumspor","Elazığspor","Adanaspor","Kasımpaşa","Osmanlıspor","İstanbul BB"]);
const euroTeamsBase=new Set(["Real Madrid","Barcelona","Atletico Madrid","Sevilla","Valencia","Villarreal","Manchester United","Manchester City","Chelsea","Arsenal","Liverpool","Tottenham","Newcastle United","Inter","AC Milan","Juventus","Roma","Napoli","Lazio","Fiorentina","PSG","Lyon","Marseille","Monaco","Lille","Bayern Münih","Bayern Munich","Dortmund","RB Leipzig","Schalke 04","Werder Bremen","Wolfsburg","Ajax","PSV","Feyenoord","Porto","Benfica","Sporting","Braga","Olympiacos","Panathinaikos","AEK Athens","Celtic","Rangers"]);
const knownExtraTeamsBase=new Set(["Boca Juniors","River Plate","Santos","Flamengo","Palmeiras","Corinthians","Sao Paulo","Gremio","Cruzeiro","Vasco da Gama","Fluminense","Internacional","Atletico Mineiro","Botafogo","LA Galaxy","Inter Miami","Al Nassr","Al Hilal","Al Ahli","Al Ittihad","Shakhtar Donetsk","Dynamo Kyiv","Zenit","CSKA Moskova","Spartak Moskova","Anderlecht","Club Brugge","Basel","Young Boys","Dinamo Zagreb","Red Star","Partizan","Bayer Leverkusen","Leicester City","Everton","West Ham","Aston Villa","Real Betis","Real Sociedad","Atalanta","Nice","Rennes","Bordeaux"]);

function norm(s){return(s||"").toLocaleLowerCase("tr-TR").replaceAll("ı","i").replaceAll("İ","i").replaceAll("ş","s").replaceAll("ğ","g").replaceAll("ü","u").replaceAll("ö","o").replaceAll("ç","c").replace(/[^a-z0-9 ]+/g," ").replace(/\s+/g," ").trim();}
function pairKey(a,b){return[a,b].sort((x,y)=>x.localeCompare(y,"tr")).join("|||")}
function msg(t,type=""){const el=document.getElementById("msg");el.textContent=t;el.className="message "+type}
function status(t){document.getElementById("statusText").textContent=t}
function toast(t){const el=document.getElementById("toast");el.textContent=t;el.style.display="block";setTimeout(()=>el.style.display="none",1600)}
function hideSuggest(){document.getElementById("suggestions").style.display="none"}

function initSupabase(){
  if(!SUPABASE_URL||!SUPABASE_KEY||SUPABASE_KEY.includes("BURAYA_")){
    sb=null; msg("Supabase publishable key index.html içine eklenmeli.","bad"); return;
  }
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
}

async function loadData(){
  try{
    status("Veri yükleniyor...");
    const res=await fetch(DATA_FILE+"?v=3");
    const arr=await res.json();
    players=sanitize(arr);
    await buildIndex();
    document.getElementById("dataBadge").textContent=players.length.toLocaleString("tr-TR")+" oyuncu";
    status("Veri hazır.");
    render();
  }catch(e){
    msg("Veri dosyası okunamadı: "+DATA_FILE,"bad");
    status("Veri yüklenemedi.");
  }
}
function sanitize(arr){
  const map=new Map();
  for(const item of arr){
    if(!item||!item.name||!Array.isArray(item.teams))continue;
    const name=String(item.name).trim(),key=norm(name);
    if(!key||["nan","none","null","undefined"].includes(key))continue;
    if(!map.has(key))map.set(key,{name,teams:[]});
    const obj=map.get(key);
    for(const raw of item.teams){
      const t=String(raw||"").trim(),bad=norm(t);
      if(!t||["nan","none","null","undefined","retired","without club","unknown","career break","free transfer"].includes(bad))continue;
      if(!obj.teams.includes(t))obj.teams.push(t);
    }
  }
  return[...map.values()].filter(p=>p.teams.length);
}
function nextFrame(){return new Promise(resolve=>setTimeout(resolve,0));}

async function buildIndex(){
  allTeams=[...new Set(players.flatMap(p=>p.teams))];
  teamFreq=new Map();
  playerByNorm=new Map();
  pairMap=new Map();
  playerSearch=[];

  const total=players.length;
  for(let idx=0; idx<players.length; idx++){
    const p=players[idx];
    const nk=norm(p.name);
    playerByNorm.set(nk,p);
    playerSearch.push({n:nk,p});

    for(const t of p.teams) teamFreq.set(t,(teamFreq.get(t)||0)+1);

    const ts=[...new Set(p.teams)];
    for(let i=0;i<ts.length;i++){
      for(let j=i+1;j<ts.length;j++){
        const k=pairKey(ts[i],ts[j]);
        if(!pairMap.has(k)) pairMap.set(k,[]);
        pairMap.get(k).push(p);
      }
    }

    if(idx%700===0){
      status("Veri hazırlanıyor... "+idx.toLocaleString("tr-TR")+" / "+total.toLocaleString("tr-TR"));
      await nextFrame();
    }
  }
  status("Veri hazır.");
}
function answers(a,b){return pairMap.get(pairKey(a,b))||[]}
function pairCount(a,b){return answers(a,b).filter(p=>p&&p.name&&!["nan","none","null","undefined"].includes(norm(p.name))).length}
function teamCount(t){return teamFreq.get(t)||0}
function sample(arr,n,used=new Set()){
  const out=[]; if(!arr||!arr.length)return out; let guard=0;
  while(out.length<n&&guard<n*160){const x=arr[Math.floor(Math.random()*arr.length)];if(x&&!used.has(x)&&!out.includes(x))out.push(x);guard++}
  for(const x of arr){if(out.length>=n)break;if(x&&!used.has(x)&&!out.includes(x))out.push(x)}
  return out;
}
function shuffleSmall(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function target(){if(difficulty==="easy")return{min:7,max:220};if(difficulty==="medium")return{min:3,max:80};return{min:1,max:28}}
function validPair(a,b){const n=pairCount(a,b),r=target();return n>=r.min&&n<=r.max}
function validGrid(rs,cs){if(new Set([...rs,...cs]).size!==6)return false;for(const r of rs)for(const c of cs)if(!validPair(r,c))return false;return true}
function allowedTeams(){
  const local=[],euro=[],known=[];
  for(const t of allTeams){
    const c=teamCount(t);
    if(localTeamsBase.has(t))local.push(t);
    else if(euroTeamsBase.has(t))euro.push(t);
    else if(knownExtraTeamsBase.has(t)&&c>=6)known.push(t);
  }
  if(mode==="local")return[...new Set([...local,...euro.filter(t=>teamCount(t)>=10),...known])];
  if(mode==="balanced")return[...new Set([...local,...euro,...known])];
  return[...new Set([...euro,...known,...local.filter(t=>teamCount(t)>=12)])];
}
function boardSignature(rows,cols){return[...rows,...cols].join("||")}
function pickRows(cand){
  const used=new Set();
  const locals=cand.filter(t=>localTeamsBase.has(t));
  const euros=cand.filter(t=>euroTeamsBase.has(t));
  let rows=[];

  if(mode==="local"){
    rows=sample(locals,2,used);
    rows.forEach(x=>used.add(x));
    rows.push(...sample(cand,1,used));
  }else if(mode==="balanced"){
    rows=sample(locals,1,used);
    rows.forEach(x=>used.add(x));
    const e=sample(euros,1,used);
    e.forEach(x=>used.add(x));
    rows.push(...e);
    rows.push(...sample(cand,1,used));
  }else{
    rows=sample(euros,2,used);
    rows.forEach(x=>used.add(x));
    rows.push(...sample(cand,1,used));
  }

  rows=[...new Set(rows)].slice(0,3);
  return rows.length===3 ? shuffleSmall(rows) : [];
}

function makeBoard(){
  const cand=shuffleSmall(allowedTeams());
  if(!cand.length){
    const fallback={rows:["Galatasaray","Fenerbahçe","Beşiktaş"],cols:["Trabzonspor","Inter","Real Madrid"]};
    lastBoardSignature=boardSignature(fallback.rows,fallback.cols);
    return fallback;
  }

  for(let attempt=0; attempt<1600; attempt++){
    const rows=pickRows(cand);
    if(rows.length<3) continue;

    const used=new Set(rows);
    let possibleCols=cand.filter(t=>!used.has(t) && rows.every(r=>validPair(r,t)));

    // Mod karakterini koru ama uygun tablo bulmayı zorlaştırma.
    if(mode==="local"){
      const localCols=possibleCols.filter(t=>localTeamsBase.has(t));
      if(localCols.length>=1 && Math.random()<0.55){
        possibleCols=[...localCols, ...possibleCols.filter(t=>!localTeamsBase.has(t))];
      }
    }
    if(mode==="europe"){
      const euroCols=possibleCols.filter(t=>euroTeamsBase.has(t));
      if(euroCols.length>=2){
        possibleCols=[...euroCols, ...possibleCols.filter(t=>!euroTeamsBase.has(t))];
      }
    }

    for(let inner=0; inner<25; inner++){
      const cols=sample(possibleCols,3,used);
      if(cols.length<3) continue;
      const mixedCols=shuffleSmall(cols);
      const sig=boardSignature(rows,mixedCols);
      if(sig===lastBoardSignature && attempt<1500) continue;
      if(validGrid(rows,mixedCols)){
        lastBoardSignature=sig;
        return {rows,cols:mixedCols};
      }
    }
  }

  // Son çare: 0'lı hücre üretmemek için bilinen güvenli kombinasyonları dene.
  const safeBoards=[
    {rows:["Galatasaray","Fenerbahçe","Beşiktaş"],cols:["Trabzonspor","Inter","Real Madrid"]},
    {rows:["Galatasaray","Beşiktaş","Trabzonspor"],cols:["Fenerbahçe","Barcelona","Inter"]},
    {rows:["Fenerbahçe","Galatasaray","Sivasspor"],cols:["Beşiktaş","Trabzonspor","Napoli"]}
  ];
  for(const b of safeBoards){
    if(b.rows.every(t=>allTeams.includes(t)) && b.cols.every(t=>allTeams.includes(t)) && validGrid(b.rows,b.cols)){
      lastBoardSignature=boardSignature(b.rows,b.cols);
      return b;
    }
  }

  const fallback={rows:["Galatasaray","Fenerbahçe","Beşiktaş"],cols:["Trabzonspor","Inter","Real Madrid"]};
  lastBoardSignature=boardSignature(fallback.rows,fallback.cols);
  return fallback;
}
function roomCode(){return Math.floor(100000+Math.random()*900000).toString()}

async function createRoom(){
  if(!sb)return msg("Canlı bağlantı hazır değil.","bad");
  if(!players.length)return msg("Veri henüz yüklenmedi. Biraz bekle.","bad");
  const code=roomCode(),b=makeBoard();
  const obj={room_code:code,host_id:myId,status:"waiting",mode,difficulty,rows:b.rows,cols:b.cols,board:[[null,null,null],[null,null,null],[null,null,null]],turn:"X",score_x:0,score_o:0,winner:null};
  const {data,error}=await sb.from("rooms").insert(obj).select().single();
  if(error)return msg(error.message,"bad");
  room=data;mySide="X";subscribeRoom(code);msg("Oda kodu: "+code,"ok");render();
}
async function joinRoom(){
  if(!sb)return msg("Canlı bağlantı hazır değil.","bad");
  const code=document.getElementById("joinCode").value.trim();
  if(!code)return msg("Oda kodu yaz.","bad");
  const q=await sb.from("rooms").select("*").eq("room_code",code).single();
  if(q.error)return msg("Oda bulunamadı.","bad");
  const u=await sb.from("rooms").update({guest_id:myId,status:"playing"}).eq("room_code",code).select().single();
  if(u.error)return msg(u.error.message,"bad");
  room=u.data;mySide="O";mode=room.mode||mode;difficulty=room.difficulty||difficulty;syncButtons();subscribeRoom(code);msg("Odaya katıldın.","ok");render();
}
function subscribeRoom(code){
  if(channel)sb.removeChannel(channel);
  channel=sb.channel("room-"+code).on("postgres_changes",{event:"UPDATE",schema:"public",table:"rooms",filter:"room_code=eq."+code},p=>{room=p.new;mode=room.mode||mode;difficulty=room.difficulty||difficulty;syncButtons();render()}).subscribe();
}
async function updateRoom(fields){
  const {data,error}=await sb.from("rooms").update(fields).eq("room_code",room.room_code).select().single();
  if(error)return msg(error.message,"bad");
  room=data;render();
}
async function shuffleBoard(){
  if(!room)return msg("Önce oda oluştur veya katıl.","bad");
  if(!players.length)return msg("Veri hazır değil.","bad");
  const before=boardSignature(room.rows||[],room.cols||[]);
  const b=makeBoard();
  const after=boardSignature(b.rows,b.cols);
  await updateRoom({rows:b.rows,cols:b.cols,board:[[null,null,null],[null,null,null],[null,null,null]],turn:"X",winner:null,status:"playing",mode,difficulty});
  selected=null;
  toast(after===before?"Tablo yenilendi":"Eşleşmeler karıştırıldı");
}
async function newRound(){await shuffleBoard()}

function winner(b){
  const L=[[[0,0],[0,1],[0,2]],[[1,0],[1,1],[1,2]],[[2,0],[2,1],[2,2]],[[0,0],[1,0],[2,0]],[[0,1],[1,1],[2,1]],[[0,2],[1,2],[2,2]],[[0,0],[1,1],[2,2]],[[0,2],[1,1],[2,0]]];
  for(const l of L){const m=l.map(([r,c])=>b[r][c]?.mark);if(m[0]&&m.every(x=>x===m[0]))return m[0]}
  return null;
}
async function submitGuess(){
  if(!room)return msg("Oda yok.","bad");
  if(room.winner)return msg("Oyun bitti. Yeni tablo aç.","bad");
  if(room.turn!==mySide)return msg("Sıra sende değil.","bad");
  if(!selected)return msg("Kare seç.","bad");
  if(room.board[selected.r][selected.c])return msg("Bu kare dolu.","bad");
  const name=document.getElementById("playerInput").value.trim();
  if(!name)return msg("Oyuncu yaz.","bad");
  const p=playerByNorm.get(norm(name));
  const ans=answers(room.rows[selected.r],room.cols[selected.c]);
  const ok=p&&ans.some(x=>norm(x.name)===norm(p.name));
  const b=room.board,next=mySide==="X"?"O":"X";
  const fields={turn:next};
  if(ok){
    b[selected.r][selected.c]={mark:mySide,player:p.name};
    const w=winner(b);
    fields.board=b;
    if(w){fields.winner=w;fields.status="finished";if(w==="X")fields.score_x=(room.score_x||0)+1;else fields.score_o=(room.score_o||0)+1}
    msg("Doğru.","ok");
  }else{
    msg("Yanlış. Sıra geçti.","bad");
  }
  await sb.from("moves").insert({room_code:room.room_code,player_side:mySide,row_index:selected.r,col_index:selected.c,player_name:name,is_correct:!!ok});
  selected=null;document.getElementById("playerInput").value="";hideSuggest();
  await updateRoom(fields);
}
function selectCell(r,c){if(!room||room.board[r][c]||room.winner)return;selected={r,c};render()}
function setMode(m){mode=m;syncButtons();if(room&&mySide==="X")shuffleBoard()}
function setDifficulty(d){difficulty=d;syncButtons();if(room&&mySide==="X")shuffleBoard()}
function syncButtons(){
  document.querySelectorAll(".mode-btn[data-mode]").forEach(b=>b.classList.toggle("active",b.dataset.mode===mode));
  document.querySelectorAll(".mode-btn[data-difficulty]").forEach(b=>b.classList.toggle("active",b.dataset.difficulty===difficulty));
}
function suggest(){
  const q=norm(document.getElementById("playerInput").value),box=document.getElementById("suggestions");
  if(q.length<2){box.style.display="none";return}
  const list=[];
  for(const item of playerSearch){
    if(item.n.includes(q)){
      list.push(item.p);
      if(list.length>=10)break;
    }
  }
  box.innerHTML=list.map(p=>`<div class="suggestion" onclick="pickName('${p.name.replaceAll("'","\\'")}')">${p.name}</div>`).join("");
  box.style.display=list.length?"block":"none";
}
function pickName(n){document.getElementById("playerInput").value=n;hideSuggest()}
function handleKey(e){if(e.key==="Enter")submitGuess()}

function render(){
  const rows=room?.rows||["-","-","-"],cols=room?.cols||["-","-","-"],board=room?.board||[[null,null,null],[null,null,null],[null,null,null]];
  document.getElementById("roomText").textContent=room?.room_code||"-";
  document.getElementById("roomCodeBox").textContent=room?.room_code||"------";
  document.getElementById("sideText").textContent=mySide||"-";
  document.getElementById("turnText").textContent=room?.winner?("Kazanan "+room.winner):(room?.turn||"-");
  document.getElementById("scoreText").textContent=(room?.score_x||0)+" - "+(room?.score_o||0);
  const connected=room?((room.guest_id&&room.host_id)?"İki oyuncu bağlı.":"Oda açık, rakip bekleniyor."):"Oda yok.";
  status(players.length?connected:"Veri hazırlanıyor...");

  let h="<tr><th class='corner'></th>"+cols.map(c=>`<th>${c}</th>`).join("")+"</tr>";
  for(let r=0;r<3;r++){
    h+=`<tr><th>${rows[r]}</th>`;
    for(let c=0;c<3;c++){
      const cell=board[r][c],cnt=pairCount(rows[r],cols[c]);
      if(cell){
        h+=`<td><span class="mark ${cell.mark.toLowerCase()}">${cell.mark}</span><span class="player-name">${cell.player}</span></td>`;
      }else{
        const sel=selected&&selected.r===r&&selected.c===c;
        h+=`<td class="empty ${sel?'selected':''}" onclick="selectCell(${r},${c})"><span class="cell-tag">${cnt}</span><span class="plus">+</span></td>`;
      }
    }
    h+="</tr>";
  }
  document.getElementById("grid").innerHTML=h;
}
function leaveRoom(){room=null;mySide=null;selected=null;if(channel)sb.removeChannel(channel);render();msg("Odadan çıktın.")}
function preventGesture(){
  // Sadece iOS pinch gesture engellenir. Touchend engellenmez;
  // böylece scroll, kopyala-yapıştır, seçim ve normal dokunma bozulmaz.
  document.addEventListener("gesturestart",e=>e.preventDefault());
  document.addEventListener("gesturechange",e=>e.preventDefault());
  document.addEventListener("gestureend",e=>e.preventDefault());
}
preventGesture();
initSupabase();
loadData();
render();
</script>
